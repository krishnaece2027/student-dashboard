<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>edit</title>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">Edit Student</h2>

    <form method="POST" action="/update/{{ student[0] }}" class="card p-4 shadow">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" value="{{ student[1] }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Age</label>
            <input type="number" name="age" value="{{ student[2] }}" class="form-control">
        </div>

        <button class="btn btn-warning">Update</button>
    </form>
</div>

</body>
</html>
